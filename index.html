<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOYAH DAY - Video Processor Tool (ULTRA PRO)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Hind+Siliguri:wght@500;600;700&display=swap');

        body {
            background-color: #0b0c10;
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Teko', sans-serif;
            color: #ffb900;
            font-size: 42px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 4px 10px rgba(255, 185, 0, 0.4);
        }

        .app-wrapper {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* Controls Section */
        .container {
            background: #1f2833;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #45a29e;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #66fcf1;
            font-weight: 600;
            font-size: 15px;
        }

        input[type="file"], input[type="text"], select {
            display: block;
            width: 100%;
            padding: 12px;
            background: #0b0c10;
            border: 1px solid #45a29e;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        input[type="text"] {
            cursor: text;
        }

        .theme-selector {
            background: #0b0c10;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffb900;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(90deg, #ff8c00, #ffb900);
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 6px;
            color: #000;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.6);
        }

        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #00e6ff;
            text-align: center;
        }

        #download-link {
            display: none;
            margin-top: 20px;
            background: #66fcf1;
            color: #000;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        
        #download-link:hover {
            background: #45a29e;
            color: #fff;
        }

        /* Preview Section */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 360px;
        }

        .preview-tabs {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #1f2833;
            border: 1px solid #45a29e;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #45a29e;
            color: #000;
        }

        .preview-canvas-container {
            position: relative;
            width: 360px;
            height: 640px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }

        #previewCanvas {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=360&q=80') center/cover;
        }

        #renderCanvas, #sourceVideo {
            display: none;
        }
    </style>
</head>
<body>

    <h1>BOOYAH DAY VIDEO TOOL (ULTRA PRO)</h1>
    
    <div class="app-wrapper">
        <div class="container">
            <div class="input-group">
                <label>১. রিল বা ভিডিও আপলোড করুন (MP4):</label>
                <input type="file" id="videoFile" accept="video/*">
            </div>

            <!-- New Bouncing Watermark Feature -->
            <div class="theme-selector">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkWatermark" checked> 1. Reel Watermark (টিকটক স্টাইল)
                </label>
                <input type="text" id="watermarkText" value="@booyah_day_app" placeholder="ইউজারনেম বা টেক্সট দিন">
            </div>

            <div class="theme-selector">
                <label style="color:#ffb900; font-weight:bold; font-size:16px; margin-bottom:10px; display:block;">2. কাস্টম লিংক ও কিউআর কোড (Custom Links)</label>
                <input type="text" id="websiteLink" value=(document.getElementById('websiteLink')?document.getElementById('websiteLink').value.toUpperCase():"WWW.GOOGLE.COM") placeholder="ওয়েবসাইট লিংক দিন (যেমন: BOOYAH.COM)" style="margin-bottom:10px;">
                <input type="text" id="qrLink" value="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.google.com&bgcolor=ffffff" placeholder="QR Code Image Link">
            </div>

            <div class="theme-selector">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkOverlay" checked> 3. Overlay Ad (ওয়াটারমার্ক)
                </label>
                <select id="overlayTheme">
                    <option value="1">Theme 1: Premium Sliding Box</option>
                    <option value="2">Theme 2: Character Popup (Shani)</option>
                    <option value="3">Theme 3: Floating Badge</option>
                    <option value="4">Theme 4: News Ticker</option>
                    <option value="5">Theme 5: Diagonal Banner</option>
                    <option value="6">Theme 6: Diamond Rain</option>
                    <option value="7">Theme 7: Dual Character Clash</option>
                    <option value="8">Theme 8: Flash Sale/Warning</option>
                    <option value="9" style="color:#ffb900;">Theme 9: Esports Broadcast (Premium)</option>
                    <option value="10" style="color:#ffb900;">Theme 10: iOS Style Popup (Premium)</option>
                </select>
            </div>

            <div class="theme-selector">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkOutro" checked> 4. Outro Ad (ভিডিওর শেষে)
                </label>
                <select id="outroTheme">
                    <option value="1">Theme 1: Premium Slam & Dust</option>
                    <option value="2">Theme 2: Fire Character Reveal</option>
                    <option value="3">Theme 3: Cyber Glitch Text</option>
                    <option value="4">Theme 4: Diamond Explosion</option>
                    <option value="5">Theme 5: Neon Sign Glowing</option>
                    <option value="6">Theme 6: Countdown Rush</option>
                    <option value="7" style="color:#00e6ff;">Theme 7: Golden Victory Confetti (NEW)</option>
                    <option value="8" style="color:#00e6ff;">Theme 8: Speed Blur Rush (NEW)</option>
                </select>
            </div>

            <button class="btn" id="processBtn">ভিডিও প্রসেস করুন</button>
            <div id="status"></div>
            <a id="download-link" download="booyah_processed_reel.webm">⬇ ভিডিও ডাউনলোড করুন</a>
        </div>

        <div class="preview-section">
            <div class="preview-tabs">
                <button class="tab-btn active" id="tabOverlay" onclick="setPreviewMode('overlay')">Preview Overlay</button>
                <button class="tab-btn" id="tabOutro" onclick="setPreviewMode('outro')">Preview Outro</button>
            </div>
            <div class="preview-canvas-container">
                <canvas id="previewCanvas" width="360" height="640"></canvas>
            </div>
        </div>
    </div>

    <video id="sourceVideo" muted playsinline></video>
    <canvas id="renderCanvas" width="720" height="1280"></canvas>

    <script>
        const videoInput = document.getElementById('videoFile');
        const processBtn = document.getElementById('processBtn');
        const statusDiv = document.getElementById('status');
        const sourceVideo = document.getElementById('sourceVideo');
        const renderCanvas = document.getElementById('renderCanvas');
        const renderCtx = renderCanvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const downloadLink = document.getElementById('download-link');
        
        const chkWatermark = document.getElementById('chkWatermark');
        const watermarkText = document.getElementById('watermarkText');
        const chkOverlay = document.getElementById('chkOverlay');
        const overlayThemeSelect = document.getElementById('overlayTheme');
        const chkOutro = document.getElementById('chkOutro');
        const outroThemeSelect = document.getElementById('outroTheme');

        let previewMode = 'overlay'; 
        let previewOutroStartTime = Date.now();
        let mediaRecorder;
        let recordedChunks = [];
        let processOutroStartTime = 0;
        let isProcessing = false;

        // Load Images
        const qrLinkInput = document.getElementById('qrLink');
        const websiteLinkInput = document.getElementById('websiteLink');
        const logoImg = new Image(); logoImg.src = "https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Free%20fire/booyah_day.png";
        const qrImg = new Image(); if(qrLinkInput) { qrImg.src = qrLinkInput.value; qrLinkInput.addEventListener('input', () => { qrImg.src = qrLinkInput.value; }); }
        const charImg = new Image(); charImg.src = "https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Free%20fire/1781173588043__CITYPNG.COM_Free_Fire_Shani_Female_Character___800x800.png";
        
        // App Logo for Watermark
        const appLogoImg = new Image(); appLogoImg.src = "https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Free%20fire/App%20logo.png";

        function setPreviewMode(mode) {
            previewMode = mode;
            document.getElementById('tabOverlay').classList.remove('active');
            document.getElementById('tabOutro').classList.remove('active');
            document.getElementById(mode === 'overlay' ? 'tabOverlay' : 'tabOutro').classList.add('active');
            if(mode === 'outro') previewOutroStartTime = Date.now(); 
        }

        function previewLoop() {
            previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            const time = Date.now() / 1000;
            
            if (previewMode === 'overlay') {
                previewCtx.fillStyle = "rgba(0,0,0,0.3)";
                previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
                
                if (chkWatermark.checked) {
                    drawWatermark(previewCtx, previewCanvas.width, previewCanvas.height, time, watermarkText.value || "BOOYAH DAY");
                }

                if (chkOverlay.checked) {
                    drawOverlay(previewCtx, previewCanvas.width, previewCanvas.height, overlayThemeSelect.value, time);
                }
            } else if (previewMode === 'outro') {
                if (chkOutro.checked) {
                    let elapsed = (time * 1000 - previewOutroStartTime) / 1000;
                    if (elapsed > 6) { previewOutroStartTime = Date.now(); elapsed = 0; }
                    drawOutro(previewCtx, previewCanvas.width, previewCanvas.height, outroThemeSelect.value, elapsed);
                } else {
                    previewCtx.fillStyle = "#000"; previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
                    previewCtx.fillStyle = "#fff"; previewCtx.font = "20px sans-serif";
                    previewCtx.textAlign = "center"; previewCtx.fillText("Outro Ad Disabled", previewCanvas.width/2, previewCanvas.height/2);
                    previewCtx.textAlign = "left";
                }
            }
            requestAnimationFrame(previewLoop);
        }
        requestAnimationFrame(previewLoop);

        processBtn.addEventListener('click', async () => {
            if (!videoInput.files.length) { alert("দয়া করে আগে একটি ভিডিও সিলেক্ট করুন!"); return; }
            if (isProcessing) return;

            isProcessing = true; processBtn.disabled = true; downloadLink.style.display = "none";
            statusDiv.innerText = "প্রসেসিং হচ্ছে, দয়া করে অপেক্ষা করুন...";

            const file = videoInput.files[0];
            sourceVideo.src = URL.createObjectURL(file);
            sourceVideo.onloadeddata = () => {
                const aspect = sourceVideo.videoWidth / sourceVideo.videoHeight;
                if (aspect < 1) { renderCanvas.width = 720; renderCanvas.height = 720 / aspect; } 
                else { renderCanvas.width = 1280; renderCanvas.height = 1280 / aspect; }
                startRecording();
            };
            sourceVideo.play();
        });

        function startRecording() {
            const stream = renderCanvas.captureStream(30); 
            let mimeType = 'video/webm; codecs=vp9';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 3000000 });
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                downloadLink.href = URL.createObjectURL(new Blob(recordedChunks, { type: mimeType }));
                downloadLink.style.display = "block";
                statusDiv.innerText = "প্রসেসিং সফল হয়েছে!";
                isProcessing = false; processBtn.disabled = false; processOutroStartTime = 0; 
            };
            mediaRecorder.start();
            processLoop();
        }

        function processLoop() {
            if (!isProcessing) return;
            const time = Date.now() / 1000;

            if (sourceVideo.ended) {
                if (chkOutro.checked) {
                    if (processOutroStartTime === 0) processOutroStartTime = Date.now();
                    const elapsed = (Date.now() - processOutroStartTime) / 1000;
                    if (elapsed > 6) { mediaRecorder.stop(); return; }
                    drawOutro(renderCtx, renderCanvas.width, renderCanvas.height, outroThemeSelect.value, elapsed);
                } else { mediaRecorder.stop(); return; }
            } else {
                renderCtx.fillStyle = "#000"; renderCtx.fillRect(0, 0, renderCanvas.width, renderCanvas.height);
                const scale = Math.min(renderCanvas.width / sourceVideo.videoWidth, renderCanvas.height / sourceVideo.videoHeight);
                const drawW = sourceVideo.videoWidth * scale, drawH = sourceVideo.videoHeight * scale;
                renderCtx.drawImage(sourceVideo, (renderCanvas.width - drawW) / 2, (renderCanvas.height - drawH) / 2, drawW, drawH);
                
                if (chkWatermark.checked) {
                    drawWatermark(renderCtx, renderCanvas.width, renderCanvas.height, time, watermarkText.value || "BOOYAH DAY");
                }

                if (chkOverlay.checked) {
                    drawOverlay(renderCtx, renderCanvas.width, renderCanvas.height, overlayThemeSelect.value, time);
                }
            }
            requestAnimationFrame(processLoop);
        }

        // ==========================================
        // 1. BOUNCING WATERMARK (TikTok / IG Reel Style)
        // ==========================================
        function drawWatermark(ctx, cw, ch, time, text) {
            const scale = cw / 720; 
            ctx.save(); ctx.scale(scale, scale);
            const w = 720, h = ch / scale;

            const cycle = 4; // changes position every 4 seconds
            const posIdx = Math.floor(time / cycle) % 4;
            const phase = time % cycle;
            
            let alpha = 1;
            if (phase < 0.3) alpha = phase / 0.3; // fade in
            else if (phase > cycle - 0.3) alpha = (cycle - phase) / 0.3; // fade out

            let x, y;
            const wmWidth = 250, wmHeight = 50;

            // 0: Top-Left, 1: Bottom-Right, 2: Top-Right, 3: Bottom-Left
            if (posIdx === 0) { x = 30; y = 60; }
            else if (posIdx === 1) { x = w - wmWidth - 30; y = h - wmHeight - 120; }
            else if (posIdx === 2) { x = w - wmWidth - 30; y = 60; }
            else if (posIdx === 3) { x = 30; y = h - wmHeight - 120; }

            ctx.globalAlpha = alpha;
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowBlur = 10;
            
            if (appLogoImg.complete && appLogoImg.width > 0) {
                ctx.drawImage(appLogoImg, x, y, 40, 40);
            }
            
            ctx.fillStyle = "#fff";
            ctx.font = "bold 24px 'Hind Siliguri', sans-serif";
            ctx.fillText(text, x + 50, y + 28);
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
            ctx.restore();
        }

        // ==========================================
        // 2. OVERLAY DRAWING LOGIC (10 THEMES)
        // ==========================================
        function getOverlayStates() {
            const link = document.getElementById('websiteLink') ? document.getElementById('websiteLink').value.toUpperCase() : (document.getElementById('websiteLink')?document.getElementById('websiteLink').value.toUpperCase():"WWW.GOOGLE.COM");
            return [
                { isQr: false, title: "BOOYAH DAY APP", titleCol: "#ffffff", sub: "ফ্রি ফায়ার খেলে ফ্রি ডায়মন্ড আর্নিং করুন! 💎", subCol: "#ffb900" },
                { isQr: true,  title: "স্ক্যান করে ডাউনলোড করুন", titleCol: "#00e6ff", sub: "রিল আপলোড করে টাকা আর্নিং এর সুবর্ণ সুযোগ!", subCol: "#ffffff" },
                { isQr: false, title: "FREE FIRE REWARDS", titleCol: "#ffffff", sub: "প্রতিদিন অ্যাপ থেকে ফ্রি রিওয়ার্ডস জিতে নিন!", subCol: "#ffb900" },
                { isQr: true,  title: link, titleCol: "#00e6ff", sub: "সরাসরি ওয়েবসাইট থেকে এখনই ইন্সটল করুন!", subCol: "#ffffff" }
            ];
        }

        function drawOverlay(ctx, cw, ch, theme, time) {
            const scale = cw / 720; 
            ctx.save(); ctx.scale(scale, scale);
            const w = 720, h = ch / scale;
            if(theme === '1') drawOverlay1(ctx, w, h, time);
            if(theme === '2') drawOverlay2(ctx, w, h, time);
            if(theme === '3') drawOverlay3(ctx, w, h, time);
            if(theme === '4') drawOverlay4(ctx, w, h, time);
            if(theme === '5') drawOverlay5(ctx, w, h, time);
            if(theme === '6') drawOverlay6(ctx, w, h, time);
            if(theme === '7') drawOverlay7(ctx, w, h, time);
            if(theme === '8') drawOverlay8(ctx, w, h, time);
            if(theme === '9') drawOverlay9(ctx, w, h, time);
            if(theme === '10') drawOverlay10(ctx, w, h, time);
            ctx.restore();
        }

        function drawOverlay1(ctx, w, h, time) {
            const phase = time % 3.5, state = getOverlayStates()[Math.floor((time % 14) / 3.5)];
            let yOffset = phase < 0.5 ? 20*(1 - Math.pow(1 - phase/0.5, 3)) : phase > 3.0 ? -20*Math.pow((phase-3.0)/0.5, 2) : 20;
            let alpha = phase < 0.5 ? 1 - Math.pow(1 - phase/0.5, 3) : phase > 3.0 ? 1 - Math.pow((phase-3.0)/0.5, 2) : 1;

            ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.beginPath(); ctx.roundRect(20, 30, w-40, 90, 20); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255, 185, 0, 0.4)"; ctx.stroke();
            ctx.globalAlpha = alpha;
            const cY = 30 + yOffset - 20, currentImg = state.isQr ? qrImg : logoImg;
            
            let textX = 120;
            if (currentImg.complete && currentImg.height > 0) {
                if (state.isQr) { 
                    ctx.drawImage(currentImg, 35, cY+10, 70, 70); 
                    textX = 35 + 70 + 20;
                } else { 
                    const drawWidth = 40*(currentImg.width/currentImg.height);
                    ctx.drawImage(currentImg, 35, cY+25, drawWidth, 40); 
                    textX = 35 + drawWidth + 20;
                }
            }
            
            ctx.fillStyle = state.titleCol; ctx.font = "bold 24px 'Teko', sans-serif"; ctx.fillText(state.title, textX, cY+40);
            ctx.fillStyle = state.subCol; ctx.font = "bold 18px 'Hind Siliguri', sans-serif"; ctx.fillText(state.sub, textX, cY+70);
            ctx.globalAlpha = 1.0; 
        }

        function drawOverlay2(ctx, w, h, time) {
            const floatY = Math.sin(time * 3) * 10;
            if(charImg.complete && charImg.width > 0) ctx.drawImage(charImg, -10, h - 200*(charImg.height/charImg.width) + floatY, 200, 200*(charImg.height/charImg.width));
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)"; ctx.beginPath(); ctx.roundRect(160, h-180+floatY, 400, 80, 15); ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = "#ff8c00"; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(180, h-120+floatY); ctx.lineTo(140, h-80+floatY); ctx.lineTo(210, h-100+floatY); ctx.fillStyle="white"; ctx.fill(); ctx.stroke();
            const state = getOverlayStates()[Math.floor((time%12)/3)];
            ctx.fillStyle = "#000"; ctx.font = "bold 24px 'Teko', sans-serif"; ctx.fillText(state.title, 175, h-145+floatY);
            ctx.fillStyle = "#d32f2f"; ctx.font = "bold 18px 'Hind Siliguri', sans-serif"; ctx.fillText(state.sub, 175, h-115+floatY);
        }

        function drawOverlay3(ctx, w, h, time) {
            const rot = time * 0.5, x = w - 80, y = 80, isQr = Math.floor((time%8)/4) === 1;
            ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.beginPath();
            for(let i=0; i<6; i++) ctx.arc(0, 0, 60, i*Math.PI/3, i*Math.PI/3 + 0.5);
            ctx.lineWidth = 4; ctx.strokeStyle = "#00e6ff"; ctx.stroke(); ctx.restore();
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.beginPath(); ctx.arc(x, y, 55, 0, Math.PI*2); ctx.fill();
            if (isQr && qrImg.complete) ctx.drawImage(qrImg, x-35, y-35, 70, 70);
            else if (!isQr && logoImg.complete && logoImg.width > 0) ctx.drawImage(logoImg, x-45, y-(45/(logoImg.width/logoImg.height)), 90, 90/(logoImg.width/logoImg.height));
            ctx.fillStyle = "rgba(255, 140, 0, 0.9)"; ctx.beginPath(); ctx.roundRect(x-180, y+65, 220, 35, 20); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 18px 'Hind Siliguri', sans-serif"; ctx.textAlign = "center";
            ctx.fillText(isQr ? "লিংক থেকে ইন্সটল করুন!" : "ফ্রি ডায়মন্ড জিতুন!", x-70, y+89); ctx.textAlign = "left";
        }

        function drawOverlay4(ctx, w, h, time) {
            const tY = h - 50;

                const p = (elapsed - 0.5) / 1.5; ctx.globalAlpha = (1 - p) * 0.6;
                for (let i = 0; i < 10; i++) {
                    const ang = (i/10)*Math.PI*2, dist = p*350, px = w/2 + Math.cos(ang)*dist + shakeX, py = h/2 - 150 + Math.sin(ang)*dist*0.5 + shakeY, rad = 60 + p*200;

                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, rad, 0, Math.PI*2); ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            const aspect = logoImg.complete && logoImg.width > 0 ? (logoImg.width / logoImg.height) : 3;
            const bW = Math.min(w * 0.7, 450), lW = bW * logoScale, lH = (bW / aspect) * logoScale;

            }
        }

        // Theme 8: Speed Blur Rush
        function drawOutro8(ctx, w, h, elapsed) {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);

            // Motion Blur lines
            ctx.fillStyle = "rgba(0, 230, 255, 0.5)";
            for(let i=0; i<20; i++) {
                const len = Math.random()*200 + 50;
                const speed = (elapsed * 2000 + i*100) % w;
                ctx.fillRect(speed, i * (h/20), len, 2);
            }

            if (elapsed > 0.5) {
                const zoom = Math.max(1, 3 - (elapsed - 0.5)*10); // 3 to 1 fast
                const aspect = logoImg.complete && logoImg.width > 0 ? (logoImg.width / logoImg.height) : 3;
                const lW = 300 * zoom, lH = (300/aspect) * zoom;
                
                ctx.globalAlpha = zoom === 1 ? 1 : 0.5; // blur opacity
                if (logoImg.complete) ctx.drawImage(logoImg, (w-lW)/2, h/2 - 200 - (lH/2), lW, lH);
                ctx.globalAlpha = 1.0;
                
                if (zoom === 1) {
                    ctx.textAlign = "center";
                    ctx.fillStyle = "#fff"; ctx.font = "bold 40px 'Teko', sans-serif";
                    ctx.fillText("SPEED REWARDS ACTIVATED", w/2, h/2 + 30);
                    ctx.fillStyle = "#ffb900"; ctx.font = "bold 24px 'Hind Siliguri', sans-serif";
                    ctx.fillText("দেরি না করে এখনই ডাউনলোড করুন!", w/2, h/2 + 70);
                    
                    if (qrImg.complete) ctx.drawImage(qrImg, w/2-60, h/2 + 100, 120, 120);
                    ctx.fillStyle = "#00e6ff"; ctx.font = "bold 40px 'Teko', sans-serif";
                    ctx.fillText((document.getElementById('websiteLink')?document.getElementById('websiteLink').value.toUpperCase():"WWW.GOOGLE.COM"), w/2, h/2 + 270);
                    ctx.textAlign = "left";
                }
            }
        }

    </script>
