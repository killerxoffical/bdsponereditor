<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Bot Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- ================= LINKS MANAGEMENT ================= -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col h-[90vh]">
            <div class="flex items-center justify-between mb-4 border-b border-gray-700 pb-4 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center font-bold text-xl shadow-[0_0_15px_#3b82f6]">🔗</div>
                    <div>
                        <h1 class="text-lg font-bold uppercase tracking-wider text-blue-400">URL Queue</h1>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest">TikTok, Insta, YT Links</p>
                    </div>
                </div>
                <div class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg font-mono font-bold border border-blue-500/30">
                    Total: <span id="link-count">0</span>
                </div>
            </div>

            <!-- Input Section -->
            <div class="flex flex-col gap-2 mb-4 shrink-0">
                <input type="url" id="link-input" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-blue-500 transition-colors" placeholder="Paste Video URL here...">
                <button onclick="submitLink()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl uppercase tracking-widest transition-all text-sm">
                    Add to Queue
                </button>
            </div>

            <!-- List Section (GitHub Style) -->
            <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2" id="links-list">
                <p class="text-center text-sm text-gray-500 py-10">Loading...</p>
            </div>
        </div>

        <!-- ================= ACCOUNTS MANAGEMENT ================= -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col h-[90vh]">
            <div class="flex items-center justify-between mb-4 border-b border-gray-700 pb-4 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center font-bold text-xl shadow-[0_0_15px_#f97316]">🤖</div>
                    <div>
                        <h1 class="text-lg font-bold uppercase tracking-wider text-orange-400">Bot Accounts</h1>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest">Auto Rotation Active</p>
                    </div>
                </div>
                <div class="bg-orange-500/20 text-orange-400 px-3 py-1 rounded-lg font-mono font-bold border border-orange-500/30">
                    Total: <span id="acc-count">0</span>
                </div>
            </div>

            <!-- Input Section -->
            <div class="flex flex-col gap-2 mb-4 shrink-0">
                <input type="email" id="acc-email" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Account Email">
                <input type="text" id="acc-pass" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Account Password">
                <button onclick="submitAccount()" id="acc-submit-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl uppercase tracking-widest transition-all text-sm">
                    Add Account
                </button>
            </div>

            <!-- List Section -->
            <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2" id="accounts-list">
                <p class="text-center text-sm text-gray-500 py-10">Loading...</p>
            </div>
        </div>

    </div>

    <script>
        // Firebase Configuration (আপনার ডাটাবেস লিংক)
        const firebaseConfig = {
            databaseURL: "https://booyah-day-offical-default-rtdb.firebaseio.com",
            projectId: "booyah-day-offical",
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ================= LINK MANAGEMENT =================
        function submitLink() {
            let input = document.getElementById("link-input");
            let url = input.value.trim();
            if(!url) return alert("Please enter a valid URL!");

            let btn = document.getElementById("submit-btn");
            btn.innerText = "Adding...";
            
            db.ref("pending_links").push({ url: url, addedAt: Date.now() }).then(() => {
                input.value = ""; btn.innerText = "Add to Queue";
            }).catch(e => { alert(e.message); btn.innerText = "Add to Queue"; });
        }

        db.ref("pending_links").on("value", snap => {
            let list = document.getElementById("links-list");
            let countEl = document.getElementById("link-count");
            list.innerHTML = "";
            
            if(snap.exists()) {
                let data = snap.val();
                let keys = Object.keys(data);
                countEl.innerText = keys.length;
                
                keys.forEach((key, index) => {
                    let url = data[key].url;
                    let div = document.createElement("div");
                    div.className = "bg-gray-900 p-3 rounded-lg border border-gray-700 flex flex-col gap-2";
                    // ফুল URL দেখানোর জন্য break-all ব্যবহার করা হয়েছে
                    div.innerHTML = `
                        <div class="flex justify-between items-start gap-2">
                            <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded font-bold shrink-0">#${index+1}</span>
                            <button onclick="deleteData('pending_links', '${key}')" class="text-red-500 hover:text-white bg-red-500/10 hover:bg-red-500 text-[10px] font-bold px-2 py-0.5 rounded transition-colors shrink-0">Delete</button>
                        </div>
                        <p class="text-xs text-gray-300 break-all bg-black/50 p-2 rounded border border-gray-800">${url}</p>
                    `;
                    list.appendChild(div);
                });
            } else {
                countEl.innerText = "0";
                list.innerHTML = `<p class="text-center text-sm text-gray-500 py-10">No pending links. Bot will auto-search.</p>`;
            }
        });

        // ================= ACCOUNT MANAGEMENT =================
        function submitAccount() {
            let email = document.getElementById("acc-email").value.trim();
            let pass = document.getElementById("acc-pass").value.trim();
            if(!email || !pass) return alert("Email and Password required!");

            let btn = document.getElementById("acc-submit-btn");
            btn.innerText = "Adding...";
            
            db.ref("bot_accounts").push({ 
                email: email, 
                password: pass, 
                last_used: 0, // নতুন অ্যাকাউন্ট তাই 0, যাতে বট প্রথমেই এটাকে টার্গেট করে
                addedAt: Date.now() 
            }).then(() => {
                document.getElementById("acc-email").value = ""; 
                document.getElementById("acc-pass").value = ""; 
                btn.innerText = "Add Account";
            }).catch(e => { alert(e.message); btn.innerText = "Add Account"; });
        }

        db.ref("bot_accounts").orderByChild("last_used").on("value", snap => {
            let list = document.getElementById("accounts-list");
            let countEl = document.getElementById("acc-count");
            list.innerHTML = "";
            
            if(snap.exists()) {
                let data = [];
                snap.forEach(child => { data.push({key: child.key, ...child.val()}); });
                countEl.innerText = data.length;
                
                data.forEach((acc, index) => {
                    let lastUsedStr = acc.last_used === 0 ? "Never used" : new Date(acc.last_used).toLocaleString();
                    let div = document.createElement("div");
                    div.className = "bg-gray-900 p-3 rounded-lg border border-gray-700 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="flex flex-col min-w-0 pr-2">
                            <span class="text-sm font-bold text-gray-200 truncate">${acc.email}</span>
                            <span class="text-[10px] text-gray-500">Last Post: ${lastUsedStr}</span>
                        </div>
                        <button onclick="deleteData('bot_accounts', '${acc.key}')" class="text-red-500 hover:text-white bg-red-500/10 hover:bg-red-500 text-[10px] font-bold px-2 py-1 rounded transition-colors shrink-0">Delete</button>
                    `;
                    list.appendChild(div);
                });
            } else {
                countEl.innerText = "0";
                list.innerHTML = `<p class="text-center text-sm text-gray-500 py-10">No accounts added. Bot won't work!</p>`;
            }
        });

        // ================= GENERAL DELETE =================
        function deleteData(path, key) {
            if(confirm("Are you sure?")) {
                db.ref(path + "/" + key).remove();
            }
        }
    </script>
</body>
</html>
